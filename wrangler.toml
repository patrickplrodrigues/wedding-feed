# wrangler.toml
# Wedding Live Photo Feed — Cloudflare Pages project
#
# USAGE:
#   1. Install Wrangler:  npm install -g wrangler
#   2. Login:             wrangler login
#   3. Create R2 bucket:  wrangler r2 bucket create wedding-photos
#   4. Deploy:            wrangler pages deploy . --project-name wedding-feed
#
# Or connect this repo to Cloudflare Pages via the dashboard and
# set the environment variables / R2 binding there.

name = "wedding-feed"

# ── Pages project ──────────────────────────────────────────────────────────
# Cloudflare Pages uses this section when deploying via `wrangler pages deploy`
pages_build_output_dir = "."   # static files are at the project root

compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── R2 Bucket binding ──────────────────────────────────────────────────────
# Binds the R2 bucket to the name WEDDING_BUCKET inside all Functions.
# Replace `wedding-photos` with your actual bucket name.
[[r2_buckets]]
binding = "WEDDING_BUCKET"
bucket_name = "wedding-photos"

# ── Environment variables ──────────────────────────────────────────────────
# ALLOWED_KEYS: comma-separated list of valid event access keys.
# Anyone with a matching ?event= query param can upload photos.
# Change these before deploying!
[vars]
ALLOWED_KEYS = "wedding2024,emma-luca-2024"

# PUBLIC_BUCKET_URL: (optional) If your R2 bucket has a custom public domain,
# set it here and the list endpoint will serve direct URLs instead of proxying.
# Example: PUBLIC_BUCKET_URL = "https://media.yourdomain.com"
# Leave commented out to use the private /functions/media/[key] proxy.
# PUBLIC_BUCKET_URL = ""

# ── Production overrides ───────────────────────────────────────────────────
[env.production]
name = "wedding-feed"

[[env.production.r2_buckets]]
binding = "WEDDING_BUCKET"
bucket_name = "wedding-photos"

[env.production.vars]
# Generate a real secret before your wedding!
ALLOWED_KEYS = "wedding2024,emma-luca-2024"

# ── Preview / staging ─────────────────────────────────────────────────────
[env.preview]
name = "wedding-feed-preview"

[[env.preview.r2_buckets]]
binding = "WEDDING_BUCKET"
bucket_name = "wedding-photos-preview"   # separate bucket for testing

[env.preview.vars]
ALLOWED_KEYS = "test2024"
